<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Gjett tallet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #45a049;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Gjett tallet spillet</h2>

    <form method="POST">
      <input type="text" name="guess" placeholder="Skriv et tall">
      <br>
      <button type="submit">Gjett</button>
    </form>

    <div class="message">
      {{ message }}
    </div>
  </div>

  
</body>
</html>
